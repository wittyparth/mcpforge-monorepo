name: mcpforge-dev

# ────────────────────────────────────────────────────────────────────
# MCPForge Local Dev Stack — single command to start everything.
#
#   docker compose up --build    ← ONE COMMAND. Starts ALL services.
#   docker compose down          ← Stop everything.
#
# What runs where:
#   postgres :5432  |  redis :6379  |  api :8000  |  worker (bg)  |  web :3000
# ────────────────────────────────────────────────────────────────────
# Production: Render + Neon + Upstash (see render.yaml).
# This compose file is purely for local development.
# ────────────────────────────────────────────────────────────────────

services:
  # ── Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mcpforge-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcpforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcpforge"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Cache ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mcpforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ──────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: mcpforge-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mcpforge
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-jwt-secret-please-change-in-prod-min-32-chars
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
      LLM_PROVIDER: opencode-go
      LLM_BASE_URL: https://opencode.ai/zen/go/v1
      LLM_MODEL: deepseek-v4-flash
      LLM_API_KEY: sk-uzE8bXWpo5Dta9wMvREgB1Mb1a74UhZ9pDElGXlA6Elppzdycapiq197z22OMrJG
      LLM_MAX_TOKENS: 2000
      LLM_TEMPERATURE: 0.0
      LLM_JSON_MODE: "true"
      RATE_LIMIT_PER_IP_PER_MINUTE: "999"
      RATE_LIMIT_AUTH_PER_IP_PER_MINUTE: "999"
    ports:
      - "8000:8000"
    volumes:
      # Mount source for hot-reload via uvicorn --reload
      - ./apps/api/app:/app/app
      - ./apps/api/alembic:/app/alembic
      - ./apps/api/alembic.ini:/app/alembic.ini
    develop:
      watch:
        - path: ./apps/api/app
          action: sync
          target: /app/app
    # Runs migrations then starts uvicorn with --reload
    command: ["./start-dev.sh"]

  # ── Celery worker ────────────────────────────────────────────────
  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: mcpforge-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mcpforge
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-only-jwt-secret-please-change-in-prod-min-32-chars
      LLM_PROVIDER: opencode-go
      LLM_BASE_URL: https://opencode.ai/zen/go/v1
      LLM_MODEL: deepseek-v4-flash
      LLM_API_KEY: sk-uzE8bXWpo5Dta9wMvREgB1Mb1a74UhZ9pDElGXlA6Elppzdycapiq197z22OMrJG
      LLM_MAX_TOKENS: 2000
      LLM_TEMPERATURE: 0.0
      LLM_JSON_MODE: "true"
    volumes:
      - ./apps/api/app:/app/app
    command:
      - "uv"
      - "run"
      - "celery"
      - "-A"
      - "app.core.celery_app"
      - "worker"
      - "-Q"
      - "default,ai,scanner,analytics"
      - "-l"
      - "info"
      - "--concurrency=2"
      - "--pool=solo"

  # ── Next.js frontend ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile.dev
    container_name: mcpforge-web
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      # Mount source for Next.js fast-refresh / hot reload
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
    develop:
      watch:
        - path: ./apps/web/src
          action: sync
          target: /app/apps/web/src
    # Start with turbopack for fast dev
    command: ["pnpm", "--filter", "@mcpforge/web", "dev"]

volumes:
  postgres_data:
    name: mcpforge-postgres-data
