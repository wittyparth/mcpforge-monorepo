services:
  - type: web
    name: mcpforge-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: ./apps/api
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false  # Set in Render dashboard (use Neon connection string)
      - key: REDIS_URL
        sync: false  # Set in Render dashboard (use Upstash connection string)
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://mcpforge.vercel.app  # Update when frontend URL is known
      - key: LOG_LEVEL
        value: INFO
    healthCheckPath: /health
    autoDeploy: true
    branch: main
